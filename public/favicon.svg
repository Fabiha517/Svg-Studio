<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <g fill="none" stroke="#26c6da" stroke-width="26" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- Outer Cube Frame -->
    <!-- Top-left to bottom isometric outline -->
    <path d="M 250,22 
             L 48,138 
             L 48,368 
             L 250,484 
             L 452,368 
             L 452,138" />

    <!-- Center Vertical Edge -->
    <line x1="250" y1="484" x2="250" y2="238" />

    <!-- Top Left Facet Edge -->
    <line x1="250" y1="238" x2="108" y2="156" />

    <!-- Top Right Facet Edge -->
    <line x1="250" y1="238" x2="392" y2="156" />

    <!-- Top Opening Gap Segment -->
    <line x1="250" y1="22" x2="336" y2="72" />

    <!-- Left Facet Bracket: '<' -->
    <polyline points="132,254 78,285 132,316" stroke-width="28" />

    <!-- Right Facet Bracket: '>' -->
    <polyline points="368,254 422,285 368,316" stroke-width="28" />

  </g>

  <!-- Glowing/Floating Top-Right Node Dot -->
  <circle cx="390" cy="56" r="26" fill="#26c6da" />
</svg>
